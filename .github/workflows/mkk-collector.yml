name: MKK Foreign Ratio Collector

# Yabanci saklama oranlari (MKK kaynakli) toplanir.
# Kaynak erisilemezse script exit 0 doner (akis bozulmaz) ve log neden gosterir.
on:
  schedule:
    # HAFTA ICI HER GUN: Is Yatirim screener'daki 'cari yabanci orani' ve 1H
    # degisim GUNLUK yenilenir; haftalik cron akilli-para sinyalini 4 gun
    # bayat birakiyordu (veri-tazeligi incelemesi bulgusu).
    - cron: "23 5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mkk-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Collect MKK foreign ratios
        run: python collect_mkk.py

      # P2: ayni Is Yatirim screener'dan IKINCI temel-veri kaynagi (F/K/PD/DD/ROE)
      # — TradingView ile capraz dogrulama icin. Ayri dosya; best-effort (exit 0).
      - name: Collect secondary fundamentals (Is Yatirim)
        run: python collect_fundamentals_secondary.py

      - name: Commit data
        run: |
          git config user.name 'bist-mkk-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/mkk_foreign.json data/fundamentals_secondary.json 2>/dev/null || true
          git diff --cached --quiet && { echo 'degisiklik yok'; exit 0; }
          git commit -m 'chore(mkk): yabanci saklama + ikincil temel veri guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"; sleep $((2**i))
          done
          exit 1
