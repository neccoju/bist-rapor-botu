name: MKK Foreign Ratio Collector

# Yabanci saklama oranlari (MKK kaynakli, ~T-10 gecikmeli) haftalik toplanir.
# Kaynak erisilemezse script exit 0 doner (akis bozulmaz) ve log neden gosterir.
on:
  schedule:
    - cron: "23 5 * * 1"   # pazartesi 05:23 UTC (haftalik yeterli; veri zaten gecikmeli)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mkk-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Collect MKK foreign ratios
        run: python collect_mkk.py

      - name: Commit data
        run: |
          git config user.name 'bist-mkk-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/mkk_foreign.json 2>/dev/null || true
          git diff --cached --quiet && { echo 'degisiklik yok'; exit 0; }
          git commit -m 'chore(mkk): yabanci saklama oranlari guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"; sleep $((2**i))
          done
          exit 1
