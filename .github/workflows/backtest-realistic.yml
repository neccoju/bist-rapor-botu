name: Model Portfolio Backtest (Realistic)

# Gercekci backtest: RFS teknik skoru (point-in-time) + o anki likidite kapisi
# + karekok piyasa-etkisi maliyeti. Gunluk raporu/state'i ETKILEMEZ.
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Baslangic (yyyy-MM-dd)"
        required: false
        default: "2024-09-01"
      top_n:
        description: "Portfoy hisse sayisi"
        required: false
        default: "5"
      max_stocks:
        description: "Evren buyuklugu (piyasa degerine gore fetch)"
        required: false
        default: "300"
      cost_bps:
        description: "Sabit islem maliyeti (bps)"
        required: false
        default: "20"
      min_adv_tl:
        description: "O anki min gunluk TL hacim (likidite kapisi)"
        required: false
        default: "3000000"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backtest:
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run realistic backtest
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Backtest-Realistic.ps1 -StartDate ([datetime]"${{ github.event.inputs.start_date }}") -TopN ([int]"${{ github.event.inputs.top_n }}") -MaxStocks ([int]"${{ github.event.inputs.max_stocks }}") -CostBps ([double]"${{ github.event.inputs.cost_bps }}") -MinAdvTl ([double]"${{ github.event.inputs.min_adv_tl }}")
