name: TEFAS Fund Flow Collector

# Hisse senedi fonu net akisi (TEFAS, ~1-2 is gunu gecikmeli) haftalik toplanir.
# Kaynak erisilemezse script exit 0 doner (akis bozulmaz) ve log neden gosterir.
on:
  schedule:
    - cron: "37 5 * * 1"   # pazartesi 05:37 UTC (mkk-collector'dan sonra)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tefas-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Collect TEFAS fund flows
        run: python collect_tefas.py

      - name: Commit data
        run: |
          git config user.name 'bist-tefas-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/tefas_flows.json 2>/dev/null || true
          git diff --cached --quiet && { echo 'degisiklik yok'; exit 0; }
          git commit -m 'chore(tefas): fon akisi verisi guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"; sleep $((2**i))
          done
          exit 1
