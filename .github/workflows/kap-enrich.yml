name: KAP Enrich (icerik yorumlama)

# Secili (SON GUN + izlenen hisseler) KAP bildirimlerinin GOVDE metnini borsapy
# get_news_content ile ceker, LLM ile yorumlar (ozet + yon + etki + tutar) ve
# data/kap_enrichment.json'a yazar. collect_kap.py'nin dosyasini DEGISTIRMEZ (ayri
# dosya); rapor ikisini disclosureId ile birlestirir. Ana botu ETKILEMEZ.
#
# MOTOR (varsayilan): GitHub Models — UCRETSIZ, Actions GITHUB_TOKEN ile
# (permissions: models: read). Ayri odeme/anahtar gerekmez. Acik modeller
# (Llama/Mistral/DeepSeek) veya openai/gpt-4o-mini secilebilir. Alternatif motor:
# llm (Claude API, ANTHROPIC_API_KEY secret).
#
# Zamanlama: collector partileri bittikten SONRA (or. 17:45) gunde bir tetiklenir;
# ya da elle Run workflow. Token tasarrufu: yalniz izlenen hisseler + son gun + cap.
on:
  workflow_dispatch:
    inputs:
      engine:
        description: "UCRETSIZ: github (OpenAI gpt-4.1, onerilen) | groq (Llama-3.3-70B) | openrouter | cerebras. Ucretli: llm. LLM'siz: rules"
        required: false
        default: "github"
      fallback:
        description: "Birincil motor 429'a takilirsa otomatik gecis: auto (varsayilan sira) | none (kapali) | virgulle liste (or. groq,cerebras)"
        required: false
        default: "auto"
      model:
        description: "Model id (bos=otomatik). github icin or. openai/gpt-4o-mini veya meta/Llama-3.3-70B-Instruct"
        required: false
        default: ""
      max_items:
        description: "Bu kosuda en fazla yorumlanacak bildirim"
        required: false
        default: "25"
      max_age_days:
        description: "Kac gun geriye kadar (son gun = 1; backfill icin 7)"
        required: false
        default: "1"
      scope:
        description: "Kapsam: priority (izlenen hisseler) | all (TUM hisseler — backfill)"
        required: false
        default: "priority"
      importance:
        description: "Hangi onem seviyeleri (virgulle; or. high veya high,insider)"
        required: false
        default: "high"
      force:
        description: "Zaten yorumlanmislari da yeniden yorumla (true/false)"
        required: false
        default: "false"

permissions:
  contents: write
  models: read

concurrency:
  group: kap-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install borsapy (+ anthropic, llm motoru icin)
        run: |
          python -m pip install --upgrade pip
          pip install borsapy anthropic
      # Agsiz birim test kapisi: saf yardimcilar + fallback zinciri bozuksa enrich
      # calismadan once dur (kotu kayit yazilmasin).
      - name: Unit tests (agsiz)
        run: python test_enrich_kap.py
      - name: Enrich KAP disclosures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          SCOPE=""
          if [ "${{ github.event.inputs.scope }}" = "all" ]; then SCOPE="--all-stocks"; fi
          python enrich_kap.py \
            --engine "${{ github.event.inputs.engine || 'github' }}" \
            --fallback "${{ github.event.inputs.fallback || 'auto' }}" \
            --model "${{ github.event.inputs.model || '' }}" \
            --max-items "${{ github.event.inputs.max_items || '25' }}" \
            --max-age-days "${{ github.event.inputs.max_age_days || '1' }}" \
            --importance "${{ github.event.inputs.importance || 'high' }}" \
            --max-seconds 960 $FORCE $SCOPE
      - name: Commit enrichment to repo
        shell: bash
        run: |
          git config user.name 'kap-enrich-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/kap_enrichment.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok; commit atlandi."
            exit 0
          fi
          git commit -m 'chore(kap): KAP icerik yorumlari guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && { echo "push OK"; break; }
            echo "push denemesi $i basarisiz; rebase + tekrar"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
