name: KAP Collector (borsapy)

# BIST hisseleri icin KAP son bildirimlerini borsapy ile ceker, kategorilere ayirir
# ve data/kap_disclosures.json'a BIRIKTIREREK yazar (merge). Ana gunluk rapor
# (PowerShell) bu dosyayi best-effort okur. Ana botu ETKILEMEZ; ayri ubuntu job.
#
# BIRIKTIRME + DÖNÜŞÜMLÜ TARAMA: kaynak ~100+ hizli istekten sonra baglantiyi
# kesip throttle ettigi icin tum evren her gun bastan taranmaz. Her kosu sadece
# bir dilim (vars. 300 hisse) tarar, yeni bildirimleri ilgili hissenin arsivine
# disclosureId ile tekillestirerek EKLER; o gun sıraya gelmeyen hisseler onceki
# verisini KORUR. rotationCursor JSON'da tutulur; ertesi gun siradan devam eder.
# Boylece ~3 gunde tum evren tazelenir ve dosya hep dolu kalir.
#
# Zamanlama: harici tetikleyici (cron-job.org) ile ana rapordan ONCE (or. 17:55)
# her gun tetiklenmeli; ya da elle Run workflow. GitHub'in kendi cron'u
# gecikebildigi icin kullanilmadi.
on:
  workflow_dispatch:
    inputs:
      rotate_size:
        description: "Bu kosuda taranacak hisse (dönüşümlü; 0 = tum evren tek seferde)"
        required: false
        default: "300"
      max_stocks:
        description: "Evren ust siniri (0 = tum BIST; rotasyon icin taban liste)"
        required: false
        default: "0"
      news_limit:
        description: "Hisse basina cekilen en yeni bildirim"
        required: false
        default: "8"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install borsapy
        run: |
          python -m pip install --upgrade pip
          pip install borsapy
      - name: Collect KAP disclosures
        run: |
          python collect_kap.py \
            --rotate-size "${{ github.event.inputs.rotate_size || '300' }}" \
            --max-stocks "${{ github.event.inputs.max_stocks || '0' }}" \
            --news-limit "${{ github.event.inputs.news_limit || '8' }}" \
            --max-seconds 1500
      - name: Commit JSON to repo
        shell: bash
        run: |
          git config user.name 'kap-collector-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/kap_disclosures.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok; commit atlandi."
            exit 0
          fi
          git commit -m 'chore(kap): KAP bildirimleri guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && { echo "push OK"; break; }
            echo "push denemesi $i basarisiz; rebase + tekrar"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
