name: KAP Collector (borsapy)

# BIST hisseleri icin KAP son bildirimlerini borsapy ile ceker, kategorilere ayirir
# ve data/kap_disclosures.json'a BIRIKTIREREK yazar (merge). Ana gunluk rapor
# (PowerShell) bu dosyayi best-effort okur. Ana botu ETKILEMEZ; ayri ubuntu job.
#
# BIRIKTIRME + DÖNÜŞÜMLÜ TARAMA, KUCUK PARTILER: kaynak ~100 hizli istekten sonra
# baglantiyi kesip throttle ediyor (canli olcum: 100 hisse 99sn, 0 hata; 100 ustu
# hata patlamasi). Bu yuzden tum evren tek seferde degil, gun icinde KUCUK PARTILER
# halinde toplanir:
# - VARSAYILAN: saf rotasyon, parti basina 100 hisse (--rotate-size 100,
#   --no-priority). rotationCursor JSON'da tutulur, sonraki parti siradan devam.
#   100 istek ~99sn, 0 hata -> guvenli esik.
# - Yeni bildirimler ilgili hissenin arsivine disclosureId ile tekillestirerek
#   EKLENIR; o partide siraya gelmeyen hisseler onceki verisini KORUR.
# - 777 hisse 100'serden ~8 partide bir tur atar.
# - (Opsiyon) no_priority=false yapilirsa Top picks + model portfoy + anlik giris
#   holdingleri (botun state JSON'larindan) her partide ek olarak taranir.
#
# Zamanlama (cron-job.org): gun icinde sik tetikle (or. 09:30-18:00 arasi her ~30
# dk, ~17 slot) -> tum evren gun icinde ~2 kez taranir. Ana rapor 18:15'te birikmis
# veriyi okur. GitHub'in kendi cron'u gecikebildigi icin harici tetikleyici kullanilir.
on:
  # YEDEK cron (tam-otomasyon): birincil tetikleyici cron-job.org'dur (gun ici
  # partiler). O aksarsa bile gunde EN AZ BIR parti garanti — insider/haber
  # sinyali sessizce curumesin. Collector merge-tabanli/idempotent oldugu
  # icin cift tetiklenme zararsizdir.
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      rotate_size:
        description: "Bu partide taranacak rest hisse sayisi (oncelikliler haric; 0 = tum rest)"
        required: false
        default: "100"
      max_stocks:
        description: "Evren ust siniri (0 = tum BIST; rotasyon icin taban liste)"
        required: false
        default: "0"
      news_limit:
        description: "Hisse basina cekilen en yeni bildirim"
        required: false
        default: "8"
      no_priority:
        description: "true: oncelikli (Top/portfoy/anlik giris) hisseleri bu partide TARAMA, sadece saf rotasyon"
        required: false
        default: "true"

permissions:
  contents: write

# Partiler ust uste binmesin (git push catismasi olmasin) diye seri calistir.
concurrency:
  group: kap-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install borsapy
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Collect KAP disclosures
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.no_priority || 'true' }}" = "true" ]; then EXTRA="--no-priority"; fi
          python collect_kap.py \
            --rotate-size "${{ github.event.inputs.rotate_size || '100' }}" \
            --max-stocks "${{ github.event.inputs.max_stocks || '0' }}" \
            --news-limit "${{ github.event.inputs.news_limit || '8' }}" \
            --max-seconds 600 $EXTRA
      - name: Commit JSON to repo
        shell: bash
        run: |
          git config user.name 'kap-collector-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/kap_disclosures.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok; commit atlandi."
            exit 0
          fi
          git commit -m 'chore(kap): KAP bildirimleri guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && { echo "push OK"; break; }
            echo "push denemesi $i basarisiz; rebase + tekrar"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((2 ** i))
          done
