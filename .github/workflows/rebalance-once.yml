name: One-Time Rebalance (manual)

# BIR DEFALIK zorunlu model portfoy rebalance'i (akilli para kurgusuna gecis;
# kullanici onayi 2026-07-03). Yalniz elle tetiklenir. Gunluk rapor ile ayni
# concurrency grubunu paylasir ki state yarisi olmasin.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = state'e yaz; false = kuru kosu (yalniz log)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: bist-cloud-report-state
  cancel-in-progress: false

jobs:
  rebalance:
    runs-on: windows-2025
    timeout-minutes: 25
    env:
      BIST_EVDS_API_KEY: ${{ secrets.BIST_EVDS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Run one-time rebalance
        shell: powershell
        run: |
          $applyFlag = @()
          if ('${{ github.event.inputs.apply }}' -eq 'true') { $applyFlag = @('-Apply') }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Invoke-OneTimeRebalance.ps1 @applyFlag
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Commit state
        if: ${{ github.event.inputs.apply == 'true' }}
        shell: bash
        run: |
          git config user.name 'bist-rebalance-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/model_portfolios.json
          git diff --cached --quiet && { echo 'degisiklik yok'; exit 0; }
          git commit -m 'chore(state): bir defalik rebalance — akilli para kurgusu [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"; sleep $((2**i))
          done
          exit 1
