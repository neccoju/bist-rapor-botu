name: OPSP Probe (odunc pay / tanilama)

# Takasbank OPP gunluk bulten kaynaginin kesfi (Smart Money: odunc/acik satis
# yogunlugu negatif sinyal adayi). Simdilik yalniz TANI: link kaliplarini
# loglar, veri dosyasi yazmaz. Kalip netlesince collector'a donusturulur.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Probe OPSP source
        run: python collect_opsp.py
