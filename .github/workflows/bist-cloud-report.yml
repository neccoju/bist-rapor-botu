name: BIST Cloud Report

on:
  # Zamanlama harici bir tetikleyici (orn. cron-job.org) ile yapilir: tam 18:15
  # Europe/Istanbul'da bu workflow'u GitHub API workflow_dispatch ile cagirir.
  # GitHub'in kendi 'schedule' cron'u saatlerce gecikebildigi icin kaldirildi.
  # 'push' tetikleyicisi de fazladan mail urettigi icin kaldirildi; gerekince
  # asagidaki workflow_dispatch ile elle veya API'den tetiklenir.
  workflow_dispatch:

# Bot state'i (model portfoyler, anlik firsat portfoyu, sinyal performansi)
# repoya geri yazilir; bu yuzden contents: write gerekir.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Ayni anda iki kosu state'i bozmasin diye seri calistir.
concurrency:
  group: bist-cloud-report-state
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: windows-2025
    timeout-minutes: 10

    env:
      BIST_EMAIL_FROM: ${{ secrets.BIST_EMAIL_FROM }}
      BIST_EMAIL_TO: ${{ secrets.BIST_EMAIL_TO }}
      BIST_SMTP_USERNAME: ${{ secrets.BIST_SMTP_USERNAME }}
      BIST_SMTP_PASSWORD: ${{ secrets.BIST_SMTP_PASSWORD }}
      BIST_SMTP_SERVER: ${{ secrets.BIST_SMTP_SERVER }}
      BIST_SMTP_PORT: ${{ secrets.BIST_SMTP_PORT }}
      BIST_SMTP_USE_SSL: ${{ secrets.BIST_SMTP_USE_SSL }}
      BIST_TELEGRAM_BOT_TOKEN: ${{ secrets.BIST_TELEGRAM_BOT_TOKEN }}
      BIST_TELEGRAM_CHAT_ID: ${{ secrets.BIST_TELEGRAM_CHAT_ID }}
      BIST_EVDS_API_KEY: ${{ secrets.BIST_EVDS_API_KEY }}
      # TR10Y icin EVDS seri kodu (repo Variable; or. TP.xxx). Bos ise Investing'e duser.
      BIST_EVDS_TR10Y_SERIES: ${{ vars.BIST_EVDS_TR10Y_SERIES }}
      # Ay sonu portfoy yorumu icin Claude (best-effort; yoksa yorum atlanir).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Verify report runtime
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'GunlukRapor.ps1',
            'BistScanner.Core.psm1',
            'Test-BistScanner.Core.ps1',
            'config\report_settings.cloud.json'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Eksik runtime dosyalari: $($missing -join ', ')"
          }
          Write-Host "Runtime dosyalari dogrulandi: $($required -join ', ')"

      - name: Check committed state
        id: check_state
        shell: powershell
        run: |
          $has = Test-Path -LiteralPath 'data\model_portfolios.json'
          "has_state=$($has.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Repoda kayitli state var mi: $has"

      # Gecis donemi kurtarmasi: repoda henuz commit'li state yoksa, eski cache
      # versiyonundan (3 dosyali yol) son tam gecmisi geri yukle. Bu yol, eski
      # workflow'un kaydettigi cache'in versiyonuyla birebir ayni olmalidir.
      - name: Recover legacy state from cache
        if: steps.check_state.outputs.has_state != 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
            data/instant_entry_portfolio.json
          key: bist-state-recover-${{ github.run_id }}
          restore-keys: |
            bist-state-

      - name: Smoke test report core
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Test-BistScanner.Core.ps1
          if ($LASTEXITCODE -ne 0) { exit 1 }
          # Denetim #6: backtest motoru da kapida — para-matematigi regresyonu maili engellesin.
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Test-BacktestEngine.ps1
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run full daily report
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\GunlukRapor.ps1 -SettingsPath .\config\report_settings.cloud.json

      # Kosu basarisiz olursa sessiz kalmasin: gunluk rapor maili hic gitmedigi
      # icin ayri bir uyari maili gonderilir. Boylece "rapor neden gelmedi?"
      # durumu fark edilir. SMTP secret'lari yoksa adim sessizce atlanir.
      - name: Notify on failure
        if: failure()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $to = $env:BIST_EMAIL_TO
          $from = $env:BIST_EMAIL_FROM
          $user = $env:BIST_SMTP_USERNAME
          $pass = $env:BIST_SMTP_PASSWORD
          $server = $env:BIST_SMTP_SERVER
          $port = $env:BIST_SMTP_PORT
          # Ana scriptteki varsayilanla ayni: server secret'i bos birakilabilir (yan bulgu duzeltmesi).
          if ([string]::IsNullOrWhiteSpace($server)) { $server = 'smtp.gmail.com' }
          if ([string]::IsNullOrWhiteSpace($to) -or [string]::IsNullOrWhiteSpace($user)) {
            Write-Host 'SMTP ayarlari eksik; uyari maili atlandi.'
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($from)) { $from = $user }
          if ([string]::IsNullOrWhiteSpace($port)) { $port = '587' }
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $subject = "[BIST BOT] Gunluk rapor kosusu BASARISIZ ($(Get-Date -Format 'dd.MM.yyyy HH:mm'))"
          $body = "Gunluk BIST rapor kosusu basarisiz oldu; rapor maili gonderilemedi.`r`n`r`nKosu kaydi (loglar):`r`n$runUrl`r`n`r`nBranch: $env:GITHUB_REF_NAME`r`nCommit: $env:GITHUB_SHA"
          try {
            $msg = New-Object System.Net.Mail.MailMessage
            $msg.From = $from
            foreach ($addr in ($to -split '[;,]')) { if ($addr.Trim()) { $msg.To.Add($addr.Trim()) } }
            $msg.Subject = $subject
            $msg.Body = $body
            $smtp = New-Object System.Net.Mail.SmtpClient($server, [int]$port)
            $smtp.EnableSsl = $true
            $smtp.Credentials = New-Object System.Net.NetworkCredential($user, $pass)
            $smtp.Send($msg)
            Write-Host 'Basarisizlik uyari maili gonderildi.'
          }
          catch {
            Write-Warning "Uyari maili gonderilemedi: $($_.Exception.Message)"
          }

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bist-report-${{ github.run_id }}
          path: |
            reports\*.html
            reports\*.csv
            reports\GunlukRapor.log
            data\last_scan.json
            data\model_portfolios.json
            data\instant_entry_portfolio.json
            data\signal_performance.json
            data\earnings_reactions.json
            data\signal_calibration.json
            data\order_intents.json
            data\paper_broker.json
            data\latest_point_in_time_snapshot.json
            data\point_in_time_snapshots\*.json
          if-no-files-found: warn

      # Kalici state yalnizca basarili rapor kosularindan sonra repoya commit edilir.
      # Boylece basarisiz veya yarim kalan kosular bot hafizasini ileri alamaz.
      # Model portfoyler, anlik firsat portfoyu ve sinyal performansi git'te izlenir;
      # bu state'i cache'in kirilgan versiyon/tahliye davranisina bagli birakmaz.
      # last_scan.json kasten haric (buyuk ve kosular arasi okunmuyor).
      # YALNIZ basarili kosularda yazilir: yarim/basarisiz bir kosu bot
      # hafizasini (portfoy/sinyal state'ini) ileri alamasin.
      - name: Persist state to repo
        if: success()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          git config user.name 'bist-report-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          $files = @(
            'data/model_portfolios.json',
            'data/instant_entry_portfolio.json',
            'data/signal_performance.json',
            'data/earnings_reactions.json',
            'data/signal_calibration.json',
            'data/order_intents.json',
            'data/paper_broker.json',
            'data/latest_point_in_time_snapshot.json',
            'docs/data/latest_report.json'
          ) | Where-Object { Test-Path -LiteralPath $_ }
          # NOT: Tarihli PIT arsivleri (data/pit + data/point_in_time_snapshots) ARTIK
          # git'e commit EDILMEZ (repo sismesini onlemek icin .gitignore'da). Calisma
          # aninda yalniz latest_point_in_time_snapshot.json okunur; tarihli arsiv
          # birikimi gerekirse ayri bir depo/branch'e tasinmali.
          if ($files.Count -eq 0) {
            Write-Host 'Kaydedilecek state dosyasi bulunamadi.'
            exit 0
          }
          git add -f $files
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'State degismedi; commit yok.'
            exit 0
          }
          git commit -m 'chore(state): bot state guncellendi [skip ci]'
          $pushed = $false
          for ($i = 0; $i -lt 4; $i++) {
            git push origin "HEAD:${env:GITHUB_REF_NAME}"
            if ($LASTEXITCODE -eq 0) { $pushed = $true; break }
            Write-Warning "State push denemesi $($i + 1) basarisiz; rebase ile tekrar denenecek."
            git pull --rebase origin "${env:GITHUB_REF_NAME}"
            Start-Sleep -Seconds ([Math]::Pow(2, $i + 1))
          }
          if (-not $pushed) {
            throw 'State repoya push edilemedi. Branch korumasi push erisimini engelliyor olabilir.'
          }
          Write-Host 'State repoya kaydedildi.'

      # Tarihli PIT anlik goruntulerini AYRI 'pit-archive' branch'ine arsivle (main'i
      # sismez; normal clone/checkout bu branch'i cekmez). Ileride survivorship/look-
      # ahead'siz backtest icin as-observed veri birikir. Best-effort: hata olursa
      # rapor bozulmaz.
      - name: Archive PIT snapshots to pit-archive branch
        if: success()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $pit = @(Get-ChildItem -Path 'data/pit' -Filter '*.json' -ErrorAction SilentlyContinue)
          $snap = @(Get-ChildItem -Path 'data/point_in_time_snapshots' -Filter '*.json' -ErrorAction SilentlyContinue)
          if ($pit.Count -eq 0 -and $snap.Count -eq 0) {
            Write-Host 'Arsivlenecek PIT anlik goruntusu yok; atlandi.'
            return
          }
          try {
            git config user.name 'bist-report-bot'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git fetch origin pit-archive --depth=1
            $wt = Join-Path $env:RUNNER_TEMP ('pitwt_' + $env:GITHUB_RUN_ID)
            if (Test-Path $wt) { git worktree remove --force $wt 2>$null }
            git worktree add -B pit-archive $wt origin/pit-archive
            New-Item -ItemType Directory -Force -Path (Join-Path $wt 'pit'), (Join-Path $wt 'point_in_time_snapshots') | Out-Null
            if ($pit.Count -gt 0)  { Copy-Item 'data/pit/*.json' (Join-Path $wt 'pit') -Force }
            if ($snap.Count -gt 0) { Copy-Item 'data/point_in_time_snapshots/*.json' (Join-Path $wt 'point_in_time_snapshots') -Force }
            Push-Location $wt
            git add -A
            git diff --cached --quiet
            if ($LASTEXITCODE -ne 0) {
              git commit -m ('pit: {0} anlik goruntu arsivi [skip ci]' -f (Get-Date -Format 'yyyy-MM-dd HH:mm')) | Out-Null
              for ($i = 0; $i -lt 3; $i++) {
                git push origin pit-archive
                if ($LASTEXITCODE -eq 0) { Write-Host 'PIT arsivi pit-archive branch''ine yazildi.'; break }
                Write-Warning "pit-archive push denemesi $($i + 1) basarisiz; rebase + tekrar."
                git pull --rebase origin pit-archive
                Start-Sleep -Seconds ([Math]::Pow(2, $i + 1))
              }
            }
            else {
              Write-Host 'pit-archive: degisiklik yok.'
            }
            Pop-Location
            git worktree remove --force $wt 2>$null
          }
          catch {
            Write-Warning "PIT arsivleme atlandi (rapor bozulmaz): $($_.Exception.Message)"
          }
