name: BIST Cloud Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bist-cloud-report.yml
      - runtime/full-bist-report-runtime.zip.b64.chunk*
  schedule:
    # 18:15 Europe/Istanbul. GitHub Actions cron uses UTC.
    - cron: "15 15 * * 1-5"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-report:
    runs-on: windows-latest
    timeout-minutes: 75

    env:
      BIST_EMAIL_FROM: ${{ secrets.BIST_EMAIL_FROM }}
      BIST_EMAIL_TO: ${{ secrets.BIST_EMAIL_TO }}
      BIST_SMTP_USERNAME: ${{ secrets.BIST_SMTP_USERNAME }}
      BIST_SMTP_PASSWORD: ${{ secrets.BIST_SMTP_PASSWORD }}
      BIST_SMTP_SERVER: ${{ secrets.BIST_SMTP_SERVER }}
      BIST_SMTP_PORT: ${{ secrets.BIST_SMTP_PORT }}
      BIST_SMTP_USE_SSL: ${{ secrets.BIST_SMTP_USE_SSL }}
      BIST_TELEGRAM_BOT_TOKEN: ${{ secrets.BIST_TELEGRAM_BOT_TOKEN }}
      BIST_TELEGRAM_CHAT_ID: ${{ secrets.BIST_TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repair packaged runtime chunks
        shell: powershell
        run: |
          $repairs = @(
            @{
              Path = '.\runtime\full-bist-report-runtime.zip.b64.chunk12'
              Old = 'YGB2HVughL/Z1W8C+LwKw0PMf3i2S4x0rsBGMJv0PIdv6j4tSj9fdZJzcEpvg7M+pe7szqDvCXgKv'
              New = 'YCB2bEtgRL+ple/MeCzCgwPMX51LYeUkrkCG/5s0nNtvqn7OC/9fNVJzsEpvQ3O+pQ6s1uDvivgKf'
            },
            @{
              Path = '.\runtime\full-bist-report-runtime.zip.b64.chunk13'
              Old = 'TJGpFYrPH6d+aKt'
              New = 'TJCpJYyvHqN+aIt'
            },
            @{
              Path = '.\runtime\full-bist-report-runtime.zip.b64.chunk16'
              Old = 'C6QukSZDDFTG+tTCzeVTCq8O2nR/NYV8kRCTOtqM0OXjP+RUSCaiWZE9mbJUIVVvrDQgopMIswtj++kPfvO7RVQv9A8c'
              New = 'C6RJkMMVMb61MLN5VMKrw7adH81hXyREJM62ozQ5eM/5FRIJqJZkT2ZslQhVW+sNCCikwizC2P76Q9+87tFVC/0Dxzoj'
            }
          )

          foreach ($repair in $repairs) {
            $text = Get-Content -Raw -LiteralPath $repair.Path
            if ($text.Contains($repair.Old)) {
              $text = $text.Replace($repair.Old, $repair.New)
              Set-Content -LiteralPath $repair.Path -Value $text -NoNewline -Encoding ASCII
            }
            elseif (-not $text.Contains($repair.New)) {
              throw "Runtime repair marker not found in $($repair.Path)."
            }
          }

          git diff -- runtime
          git diff --quiet -- runtime
          if ($LASTEXITCODE -ne 0) {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add runtime/full-bist-report-runtime.zip.b64.chunk12 runtime/full-bist-report-runtime.zip.b64.chunk13 runtime/full-bist-report-runtime.zip.b64.chunk16
            git commit -m 'Repair runtime package chunks [skip ci]'
            git push
          }

      - name: Restore full desktop report runtime
        shell: powershell
        run: |
          $expectedPartCount = 18
          $expectedPayloadChars = 68040
          $parts = Get-ChildItem -LiteralPath .\runtime -Filter 'full-bist-report-runtime.zip.b64.chunk*' | Sort-Object Name
          if ($parts.Count -ne $expectedPartCount) {
            throw "Runtime package chunk count is $($parts.Count), expected $expectedPartCount."
          }

          $payload = ($parts | ForEach-Object { (Get-Content -Raw -LiteralPath $_.FullName).Trim() }) -join ''
          if ($payload.Length -ne $expectedPayloadChars) {
            throw "Runtime package payload length is $($payload.Length), expected $expectedPayloadChars."
          }

          $zipPath = Join-Path $PWD 'full-bist-report-runtime.zip'
          [IO.File]::WriteAllBytes($zipPath, [Convert]::FromBase64String($payload))
          Expand-Archive -LiteralPath $zipPath -DestinationPath $PWD -Force

          if (-not (Test-Path .\GunlukRapor.ps1)) { throw 'GunlukRapor.ps1 package restore failed.' }
          if (-not (Test-Path .\BistScanner.Core.psm1)) { throw 'BistScanner.Core.psm1 package restore failed.' }
          if (-not (Test-Path .\config\report_settings.cloud.json)) { throw 'Cloud report settings package restore failed.' }

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
          key: bist-state-${{ github.run_id }}
          restore-keys: |
            bist-state-

      - name: Smoke test report core
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Test-BistScanner.Core.ps1

      - name: Run full daily report
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\GunlukRapor.ps1 -SettingsPath .\config\report_settings.cloud.json

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bist-report-${{ github.run_id }}
          path: |
            reports\*.html
            reports\*.csv
            reports\GunlukRapor.log
            data\last_scan.json
            data\model_portfolios.json
          if-no-files-found: warn

      - name: Save bot state
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
          key: bist-state-${{ github.run_id }}