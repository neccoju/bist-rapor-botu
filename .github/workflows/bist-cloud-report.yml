name: BIST Cloud Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bist-cloud-report.yml
      - patches/**
      - config/**
      - runtime/full-bist-report-runtime.zip.b64.chunk*
  schedule:
    # 18:15 Europe/Istanbul. GitHub Actions cron uses UTC.
    - cron: "15 15 * * *"

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-report:
    runs-on: windows-2025
    timeout-minutes: 10

    env:
      BIST_EMAIL_FROM: ${{ secrets.BIST_EMAIL_FROM }}
      BIST_EMAIL_TO: ${{ secrets.BIST_EMAIL_TO }}
      BIST_SMTP_USERNAME: ${{ secrets.BIST_SMTP_USERNAME }}
      BIST_SMTP_PASSWORD: ${{ secrets.BIST_SMTP_PASSWORD }}
      BIST_SMTP_SERVER: ${{ secrets.BIST_SMTP_SERVER }}
      BIST_SMTP_PORT: ${{ secrets.BIST_SMTP_PORT }}
      BIST_SMTP_USE_SSL: ${{ secrets.BIST_SMTP_USE_SSL }}
      BIST_TELEGRAM_BOT_TOKEN: ${{ secrets.BIST_TELEGRAM_BOT_TOKEN }}
      BIST_TELEGRAM_CHAT_ID: ${{ secrets.BIST_TELEGRAM_CHAT_ID }}
      BIST_EVDS_API_KEY: ${{ secrets.BIST_EVDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore full desktop report runtime
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $expectedPartCount = 22
          $expectedPayloadChars = 84752
          $parts = Get-ChildItem -LiteralPath .\runtime -Filter 'full-bist-report-runtime.zip.b64.chunk*' | Sort-Object Name
          if ($parts.Count -ne $expectedPartCount) {
            throw "Runtime package chunk count is $($parts.Count), expected $expectedPartCount."
          }

          $payload = ($parts | ForEach-Object { (Get-Content -Raw -LiteralPath $_.FullName).Trim() }) -join ''
          if ($payload.Length -ne $expectedPayloadChars) {
            throw "Runtime package payload length is $($payload.Length), expected $expectedPayloadChars."
          }

          $zipPath = Join-Path $PWD 'full-bist-report-runtime.zip'
          [IO.File]::WriteAllBytes($zipPath, [Convert]::FromBase64String($payload))
          Expand-Archive -LiteralPath $zipPath -DestinationPath $PWD -Force

          if (-not (Test-Path .\GunlukRapor.ps1)) { throw 'GunlukRapor.ps1 package restore failed.' }
          if (-not (Test-Path .\BistScanner.Core.psm1)) { throw 'BistScanner.Core.psm1 package restore failed.' }
          if (-not (Test-Path .\config\report_settings.cloud.json)) { throw 'Cloud report settings package restore failed.' }

      - name: Restore bot state
        uses: actions/cache/restore@v5
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
            data/instant_entry_portfolio.json
          key: bist-state-${{ github.run_id }}
          restore-keys: |
            bist-state-

      - name: Smoke test report core
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Test-BistScanner.Core.ps1

      - name: Run full daily report
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\GunlukRapor.ps1 -SettingsPath .\config\report_settings.cloud.json

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bist-report-${{ github.run_id }}
          path: |
            reports\*.html
            reports\*.csv
            reports\GunlukRapor.log
            data\last_scan.json
            data\model_portfolios.json
            data\instant_entry_portfolio.json
          if-no-files-found: warn

      - name: Save bot state
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
            data/instant_entry_portfolio.json
          key: bist-state-${{ github.run_id }}
