name: BIST Cloud Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bist-cloud-report.yml
      - "*.ps1"
      - "*.psm1"
      - patches/**
      - config/**
  schedule:
    # 18:15 Europe/Istanbul, sadece BIST islem gunleri (Pzt-Cum).
    # GitHub Actions cron UTC kullanir; Turkiye yil boyu UTC+3 oldugundan 15:15 UTC = 18:15 Istanbul.
    - cron: "15 15 * * 1-5"

# Bot state'i (model portfoyler, anlik firsat portfoyu, sinyal performansi)
# repoya geri yazilir; bu yuzden contents: write gerekir.
permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Ayni anda iki kosu state'i bozmasin diye seri calistir.
concurrency:
  group: bist-cloud-report-state
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: windows-2025
    timeout-minutes: 10

    env:
      BIST_EMAIL_FROM: ${{ secrets.BIST_EMAIL_FROM }}
      BIST_EMAIL_TO: ${{ secrets.BIST_EMAIL_TO }}
      BIST_SMTP_USERNAME: ${{ secrets.BIST_SMTP_USERNAME }}
      BIST_SMTP_PASSWORD: ${{ secrets.BIST_SMTP_PASSWORD }}
      BIST_SMTP_SERVER: ${{ secrets.BIST_SMTP_SERVER }}
      BIST_SMTP_PORT: ${{ secrets.BIST_SMTP_PORT }}
      BIST_SMTP_USE_SSL: ${{ secrets.BIST_SMTP_USE_SSL }}
      BIST_TELEGRAM_BOT_TOKEN: ${{ secrets.BIST_TELEGRAM_BOT_TOKEN }}
      BIST_TELEGRAM_CHAT_ID: ${{ secrets.BIST_TELEGRAM_CHAT_ID }}
      BIST_EVDS_API_KEY: ${{ secrets.BIST_EVDS_API_KEY }}
      # TR10Y icin EVDS seri kodu (repo Variable; or. TP.xxx). Bos ise Investing'e duser.
      BIST_EVDS_TR10Y_SERIES: ${{ vars.BIST_EVDS_TR10Y_SERIES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Verify report runtime
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'GunlukRapor.ps1',
            'BistScanner.Core.psm1',
            'Test-BistScanner.Core.ps1',
            'config\report_settings.cloud.json'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Eksik runtime dosyalari: $($missing -join ', ')"
          }
          Write-Host "Runtime dosyalari dogrulandi: $($required -join ', ')"

      - name: Check committed state
        id: check_state
        shell: powershell
        run: |
          $has = Test-Path -LiteralPath 'data\model_portfolios.json'
          "has_state=$($has.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Repoda kayitli state var mi: $has"

      # Gecis donemi kurtarmasi: repoda henuz commit'li state yoksa, eski cache
      # versiyonundan (3 dosyali yol) son tam gecmisi geri yukle. Bu yol, eski
      # workflow'un kaydettigi cache'in versiyonuyla birebir ayni olmalidir.
      - name: Recover legacy state from cache
        if: steps.check_state.outputs.has_state != 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
            data/instant_entry_portfolio.json
          key: bist-state-recover-${{ github.run_id }}
          restore-keys: |
            bist-state-

      - name: Smoke test report core
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Test-BistScanner.Core.ps1

      - name: Run full daily report
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\GunlukRapor.ps1 -SettingsPath .\config\report_settings.cloud.json

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bist-report-${{ github.run_id }}
          path: |
            reports\*.html
            reports\*.csv
            reports\GunlukRapor.log
            data\last_scan.json
            data\model_portfolios.json
            data\instant_entry_portfolio.json
            data\signal_performance.json
            data\earnings_reactions.json
            data\signal_calibration.json
          if-no-files-found: warn

      # Kalici state: model portfoyler, anlik firsat portfoyu ve sinyal
      # performansi repoya commit edilir. Boylece state, cache'in kirilgan
      # versiyon/tahliye davranisina bagli kalmaz; gecmis git'te gorunur olur.
      # last_scan.json kasten haric (buyuk ve kosular arasi okunmuyor).
      - name: Persist state to repo
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          git config user.name 'bist-report-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          $files = @(
            'data/model_portfolios.json',
            'data/instant_entry_portfolio.json',
            'data/signal_performance.json',
            'data/earnings_reactions.json',
            'data/signal_calibration.json'
          ) | Where-Object { Test-Path -LiteralPath $_ }
          # PIT anlik goruntu arsivi (tarihli dosyalar): gunluk birikir, hepsini ekle.
          if (Test-Path -LiteralPath 'data/pit') {
            $files += @(Get-ChildItem -LiteralPath 'data/pit' -Filter '*.json' -ErrorAction SilentlyContinue | ForEach-Object { "data/pit/$($_.Name)" })
          }
          if ($files.Count -eq 0) {
            Write-Host 'Kaydedilecek state dosyasi bulunamadi.'
            exit 0
          }
          git add -f $files
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host 'State degismedi; commit yok.'
            exit 0
          }
          git commit -m 'chore(state): bot state guncellendi [skip ci]'
          $pushed = $false
          for ($i = 0; $i -lt 4; $i++) {
            git push origin "HEAD:${env:GITHUB_REF_NAME}"
            if ($LASTEXITCODE -eq 0) { $pushed = $true; break }
            Write-Warning "State push denemesi $($i + 1) basarisiz; rebase ile tekrar denenecek."
            git pull --rebase origin "${env:GITHUB_REF_NAME}"
            Start-Sleep -Seconds ([Math]::Pow(2, $i + 1))
          }
          if (-not $pushed) {
            throw 'State repoya push edilemedi. Branch korumasi push erisimini engelliyor olabilir.'
          }
          Write-Host 'State repoya kaydedildi.'
