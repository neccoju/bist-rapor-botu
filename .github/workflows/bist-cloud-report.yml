name: BIST Cloud Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bist-cloud-report.yml
      - "*.ps1"
      - "*.psm1"
      - patches/**
      - config/**
  schedule:
    # 18:15 Europe/Istanbul, sadece BIST islem gunleri (Pzt-Cum).
    # GitHub Actions cron UTC kullanir; Turkiye yil boyu UTC+3 oldugundan 15:15 UTC = 18:15 Istanbul.
    - cron: "15 15 * * 1-5"

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-report:
    runs-on: windows-2025
    timeout-minutes: 10

    env:
      BIST_EMAIL_FROM: ${{ secrets.BIST_EMAIL_FROM }}
      BIST_EMAIL_TO: ${{ secrets.BIST_EMAIL_TO }}
      BIST_SMTP_USERNAME: ${{ secrets.BIST_SMTP_USERNAME }}
      BIST_SMTP_PASSWORD: ${{ secrets.BIST_SMTP_PASSWORD }}
      BIST_SMTP_SERVER: ${{ secrets.BIST_SMTP_SERVER }}
      BIST_SMTP_PORT: ${{ secrets.BIST_SMTP_PORT }}
      BIST_SMTP_USE_SSL: ${{ secrets.BIST_SMTP_USE_SSL }}
      BIST_TELEGRAM_BOT_TOKEN: ${{ secrets.BIST_TELEGRAM_BOT_TOKEN }}
      BIST_TELEGRAM_CHAT_ID: ${{ secrets.BIST_TELEGRAM_CHAT_ID }}
      BIST_EVDS_API_KEY: ${{ secrets.BIST_EVDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify report runtime
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'GunlukRapor.ps1',
            'BistScanner.Core.psm1',
            'Test-BistScanner.Core.ps1',
            'config\report_settings.cloud.json'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count -gt 0) {
            throw "Eksik runtime dosyalari: $($missing -join ', ')"
          }
          Write-Host "Runtime dosyalari dogrulandi: $($required -join ', ')"

      - name: Restore bot state
        uses: actions/cache/restore@v5
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
            data/instant_entry_portfolio.json
            data/signal_performance.json
          key: bist-state-${{ github.run_id }}
          restore-keys: |
            bist-state-

      - name: Smoke test report core
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Test-BistScanner.Core.ps1

      - name: Run full daily report
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\GunlukRapor.ps1 -SettingsPath .\config\report_settings.cloud.json

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bist-report-${{ github.run_id }}
          path: |
            reports\*.html
            reports\*.csv
            reports\GunlukRapor.log
            data\last_scan.json
            data\model_portfolios.json
            data\instant_entry_portfolio.json
            data\signal_performance.json
          if-no-files-found: warn

      - name: Save bot state
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            data/last_scan.json
            data/model_portfolios.json
            data/instant_entry_portfolio.json
            data/signal_performance.json
          key: bist-state-${{ github.run_id }}
