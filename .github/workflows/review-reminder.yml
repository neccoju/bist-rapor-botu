name: Review Reminder (gölge-mod inceleme digest'i)

# Kullanici istegi: "Agustosta bana hatirlat". Golge modda biriken gozlem
# verisini (rejim/nakit, ayar etki, devre kesici, signal-eval) ozetleyip
# e-postayla yollar. Agustos'ta 2 kez (4 ve 18) + sonra aylik hatirlatir;
# gereksizse workflow devre disi birakilir. Rapor mail yolunu DEGISTIRMEZ.
on:
  schedule:
    - cron: "0 15 4 8 *"     # 4 Agustos 15:00 UTC (18:00 Istanbul)
    - cron: "0 15 18 8 *"    # 18 Agustos
    - cron: "0 15 2 9-12 *"  # Eylul-Aralik: her ayin 2'si (signal-eval sonrasi)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: windows-2025
    timeout-minutes: 8
    env:
      BIST_EMAIL_FROM: ${{ secrets.BIST_EMAIL_FROM }}
      BIST_EMAIL_TO: ${{ secrets.BIST_EMAIL_TO }}
      BIST_SMTP_USERNAME: ${{ secrets.BIST_SMTP_USERNAME }}
      BIST_SMTP_PASSWORD: ${{ secrets.BIST_SMTP_PASSWORD }}
      BIST_SMTP_SERVER: ${{ secrets.BIST_SMTP_SERVER }}
      BIST_SMTP_PORT: ${{ secrets.BIST_SMTP_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Send review reminder digest
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\Send-ReviewReminder.ps1
