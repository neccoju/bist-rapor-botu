name: Macro News Collector

# TR makro haber basliklarini (Google News RSS) kural tabanli siniflandirip
# data/macro_news.json'a yazar; rapor rejim motoru dusuk guvenle kullanir.
# Rapor kosusundan (15:15 UTC) once calisacak sekilde zamanlanir.
on:
  schedule:
    - cron: "40 14 * * 1-5"   # hafta ici 14:40 UTC (rapordan ~35 dk once)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macro-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Unit tests (kural siniflandirici)
        run: python test_macro_news.py

      - name: Collect macro news
        run: python collect_macro_news.py

      - name: Commit data
        run: |
          git config user.name 'bist-macronews-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/macro_news.json 2>/dev/null || true
          git diff --cached --quiet && { echo 'degisiklik yok'; exit 0; }
          git commit -m 'chore(haber): makro haber olaylari guncellendi [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"; sleep $((2**i))
          done
          exit 1
