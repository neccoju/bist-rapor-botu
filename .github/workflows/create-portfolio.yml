name: Create Missing Portfolios (manual)

# Tanimda olup state'te olmayan model portfoyleri (or. yeni Kesif) HEMEN kurar;
# mevcut portfoylere dokunmaz. Ayni is otomatik olarak sonraki gunluk kosuda da
# olur (migration); bu workflow yalniz 'bugun baslat' talebi icindir.
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = state'e yaz; false = kuru kosu (yalniz log)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: bist-cloud-report-state
  cancel-in-progress: false

jobs:
  create:
    runs-on: windows-2025
    timeout-minutes: 20
    env:
      BIST_EVDS_API_KEY: ${{ secrets.BIST_EVDS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Create missing portfolios
        shell: powershell
        run: |
          $applyFlag = @()
          if ('${{ github.event.inputs.apply }}' -eq 'true') { $applyFlag = @('-Apply') }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\Invoke-CreateMissingPortfolios.ps1 @applyFlag
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Commit state
        if: ${{ github.event.inputs.apply == 'true' }}
        shell: bash
        run: |
          git config user.name 'bist-portfolio-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/model_portfolios.json
          git diff --cached --quiet && { echo 'degisiklik yok'; exit 0; }
          git commit -m 'chore(state): eksik model portfoyler olusturuldu (Kesif) [skip ci]'
          for i in 1 2 3 4; do
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            git pull --rebase origin "${GITHUB_REF_NAME}"; sleep $((2**i))
          done
          exit 1
